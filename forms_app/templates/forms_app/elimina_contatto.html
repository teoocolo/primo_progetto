{% extends "base.html" %}
{% block head_title %}{{ block.super }} | Lista Contatti{% endblock head_title %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
    <h1>Elimina Contatto</h1>
    <form method="post">
        {% csrf_token %}
        {{form|crispy}}
        <input type="submit" class="btn btn-danger" value="CONFERMA ELIMINAZIONE">
    </form>
</div>
{% endblock content %}
