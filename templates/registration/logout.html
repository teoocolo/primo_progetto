{% extends "base.html" %}
{% block head_title %}{{ block.super }} | Lista Contatti{% endblock head_title %}
{% block content %}
<div class="container">
    <h1>Logout</h1>
    <form method="post" action="{%url 'logout'%}">
        {% csrf_token %}
        <input type="submit" value="Logout">
        <input type="hidden" name="next" value="{{ next }}">
    </form>
</div>
{% endblock content %}
