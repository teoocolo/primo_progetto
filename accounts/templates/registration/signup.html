{% extends "base.html" %}
{% load crispy_forms_tags %}
{%block head_title%}{{block.super}} | Registrati{%endblock head_title%}
{% block content %}
<h2>Registrazione</h2>
<form method="post">
    {% csrf_token %}
    {{form.as_p}}
    <button type="submit">Registrati</button>
</form>

<p>
    Hai già un account?
<a href="{%url 'login' %}">Login</a>
</p>
{% endblock content %}
